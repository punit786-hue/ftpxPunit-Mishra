<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Transformation Program</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    text-align: center;
  }

  /* ── TOP GREEN BAR with shimmer ── */
  .top-bar {
    background: #00FF00;
    height: 11px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .top-bar::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.7) 50%, transparent 100%);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { left: -80%; }
    100% { left: 130%; }
  }

  /* ── HEADER — forced one line ── */
  .header {
    padding: 26px 16px 8px;
    text-align: center;
  }
  .header h1 {
    font-weight: 800;
    white-space: nowrap;
    background: linear-gradient(90deg, #fff 0%, #00FF00 60%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    /* scale font with vw so it always fits in one line */
    font-size: clamp(10px, 5vw, 24px);
    letter-spacing: 0.2px;
  }

  /* ── SUBTITLE ── */
  .subtitle {
    padding: 6px 20px 0px;
    font-size: clamp(14px, 3.8vw, 17px);
    font-weight: 500;
    color: #fff;
    text-align: center;
  }

  /* ── ARROWS + VIDEO DEKHO in one row ── */
  .watch-block {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 30px 20px 10px;
  }
  .arrow-svg {
    width: 64px;
    height: 52px;
    flex-shrink: 0;
  }
  .video-dekho {
    font-size: clamp(14px, 4vw, 17px);
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    flex: 1;
    text-align: center;
  }

  /* ── VIDEO BOX ── */
  .video-wrap {
    margin: 0 20px;
    border: 2px solid #00FF00;
    border-radius: 16px;
    overflow: hidden;
    background: #111;
  }
  .video-wrap iframe {
    width: 100%;
    height: 215px;
    display: block;
    border: none;
  }

  /* ── USKE BAAD ── */
  .uske-baad {
    padding: 18px 20px 0;
    text-align: center;
  }
  .uske-baad p {
    font-size: clamp(48px, 14vw, 76px);
    font-weight: 800;
    color: #444;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  /* ── APPLY KARO BUTTON ── */
  .apply-wrap {
    padding: 20px 20px 0;
  }
  .apply-btn {
    display: block;
    width: 100%;
    background: transparent;
    border: 2.5px solid #00FF00;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 700;
    padding: 16px 40px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .apply-btn:active { background: #00FF00; color: #000; }

  /* ── ONLY FOR ── */
  .only-for {
    padding: 28px 20px 30px;
  }
  .only-for p {
    font-size: clamp(13px, 3.6vw, 15px);
    font-weight: 800;
    color: #fff;
    margin-bottom: 12px;
    text-align: left;
  }

  /* ── ANIMATED WAVY LINE — seamless full-width loop ── */
  .wavy-wrap {
    width: 100%;
    overflow: hidden;
    height: 20px;
  }
  .wavy-inner {
    display: flex;
    width: max-content;
    animation: wave-scroll 3s linear infinite;
  }
  @keyframes wave-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-480px); }
  }
  .wavy-inner svg {
    display: block;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- TOP GREEN BAR -->
<div class="top-bar"></div>

<!-- HEADER — one line gradient -->
<div class="header">
  <h1>Financial Transformation Program</h1>
</div>

<!-- SUBTITLE -->
<div class="subtitle">🎯 ₹0 &nbsp;→&nbsp; Time Freedom ✓</div>

<!-- ARROWS + VIDEO DEKHO together -->
<div class="watch-block">
  <!-- Left arrow curving down-right -->
  <svg class="arrow-svg" viewBox="0 0 64 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M52 6 C52 6, 12 10, 10 44" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <polyline points="3,36 10,44 18,39" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>

  <span class="video-dekho">Video Dekho 👀</span>

  <!-- Right arrow curving down-left -->
  <svg class="arrow-svg" viewBox="0 0 64 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 6 C12 6, 52 10, 54 44" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <polyline points="61,36 54,44 46,39" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
</div>

<!-- VIDEO BOX -->
<div class="video-wrap">
  <iframe
    src="https://www.youtube.com/embed/_YIz7g8q2GU"
    title="Complete Details Video"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<!-- USKE BAAD -->
<div class="uske-baad">
  <p>Uske Baad</p>
</div>

<!-- APPLY KARO -->
<div class="apply-wrap">
  <a href="https://forms.gle/2Dmb8XtCy2cF6cQK6" target="_blank" class="apply-btn">Apply Karo</a>
</div>

<!-- ONLY FOR + seamless looping wavy line -->
<div class="only-for">
  <p>Only For 100 Seriously Interested Students</p>
  <div class="wavy-wrap">
    <div class="wavy-inner">
      <!-- Two identical SVGs side by side for seamless loop -->
      <svg width="480" height="20" viewBox="0 0 480 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,10 C20,3 40,17 60,10 C80,3 100,17 120,10 C140,3 160,17 180,10 C200,3 220,17 240,10 C260,3 280,17 300,10 C320,3 340,17 360,10 C380,3 400,17 420,10 C440,3 460,17 480,10"
          stroke="#cc0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <svg width="480" height="20" viewBox="0 0 480 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,10 C20,3 40,17 60,10 C80,3 100,17 120,10 C140,3 160,17 180,10 C200,3 220,17 240,10 C260,3 280,17 300,10 C320,3 340,17 360,10 C380,3 400,17 420,10 C440,3 460,17 480,10"
          stroke="#cc0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

</body>
</html>
