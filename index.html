<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Transformation Program</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    text-align: center;
  }

  /* ── TOP GREEN BAR with shimmer ── */
  .top-bar {
    background: #00FF00;
    height: 11px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .top-bar::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.7) 50%, transparent 100%);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0%   { left: -80%; }
    100% { left: 130%; }
  }

  /* ── HEADER ── */
  .header {
    padding: 26px 16px 8px;
    text-align: center;
  }
  .header h1 {
    font-weight: 800;
    white-space: nowrap;
    background: linear-gradient(90deg, #fff 0%, #00FF00 60%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: clamp(10px, 5vw, 24px);
    letter-spacing: 0.2px;
  }

  /* ── SUBTITLE ── */
  .subtitle {
    padding: 6px 20px 0;
    font-size: clamp(14px, 3.8vw, 17px);
    font-weight: 500;
    color: #fff;
    text-align: center;
  }

  /* ── VIDEO DEKHO BLOCK ── */
  .watch-block {
    padding: 28px 20px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .video-dekho-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  /* Animated green dot — pulse + glow */
  .green-dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #00FF00;
    flex-shrink: 0;
    animation: dot-pulse 1.4s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(0,255,0,0.6);
  }
  @keyframes dot-pulse {
    0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(0,255,0,0.6); }
    50%  { transform: scale(1.25); box-shadow: 0 0 0 8px rgba(0,255,0,0); }
    100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(0,255,0,0); }
  }

  .video-dekho-text {
    font-size: clamp(26px, 8vw, 36px);
    font-weight: 900;
    color: #fff;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  /* Single down arrow */
  .down-arrow {
    display: flex;
    justify-content: center;
  }
  .down-arrow svg {
    width: 28px;
    height: 34px;
  }

  /* ── VIDEO BOX ── */
  .video-wrap {
    margin: 0 20px;
    border: 2px solid #00FF00;
    border-radius: 16px;
    overflow: hidden;
    background: #111;
  }
  .video-wrap iframe {
    width: 100%;
    height: 215px;
    display: block;
    border: none;
  }

  /* ── USKE BAAD ── */
  .uske-baad {
    padding: 18px 20px 0;
    text-align: center;
  }
  .uske-baad p {
    font-size: clamp(48px, 14vw, 76px);
    font-weight: 800;
    color: #444;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  /* ── APPLY KARO ── */
  .apply-wrap {
    padding: 20px 20px 0;
  }
  .apply-btn {
    display: block;
    width: 100%;
    background: transparent;
    border: 2.5px solid #00FF00;
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 700;
    padding: 16px 40px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .apply-btn:active { background: #00FF00; color: #000; }

  /* ── ONLY FOR ── */
  .only-for {
    padding: 28px 20px 30px;
    text-align: center;
  }
  .only-for p {
    font-size: clamp(13px, 3.6vw, 15px);
    font-weight: 800;
    color: #fff;
    margin-bottom: 14px;
    text-align: center;
  }

  /* ── ANIMATED WAVY LINE ── */
  .wavy-wrap {
    width: 100%;
    overflow: hidden;
    height: 20px;
  }
  .wavy-inner {
    display: flex;
    width: max-content;
    animation: wave-scroll 3s linear infinite;
  }
  @keyframes wave-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-480px); }
  }
  .wavy-inner svg { display: block; flex-shrink: 0; }
</style>
</head>
<body>

<!-- TOP GREEN BAR -->
<div class="top-bar"></div>

<!-- HEADER -->
<div class="header">
  <h1>Financial Transformation Program</h1>
</div>

<!-- SUBTITLE -->
<div class="subtitle">🎯 ₹0 &nbsp;→&nbsp; Time Freedom ✓</div>

<!-- VIDEO DEKHO -->
<div class="watch-block">
  <div class="video-dekho-row">
    <div class="green-dot"></div>
    <span class="video-dekho-text">Video Dekho 👀</span>
  </div>
  <div class="down-arrow">
    <svg viewBox="0 0 28 34" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="14" y1="2" x2="14" y2="26" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
      <polyline points="5,18 14,28 23,18" stroke="#aaa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
</div>

<!-- VIDEO BOX — new video -->
<div class="video-wrap">
  <iframe
    src="https://www.youtube.com/embed/7jxQDSDF8o0"
    title="Complete Details Video"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

<!-- USKE BAAD -->
<div class="uske-baad">
  <p>Uske Baad</p>
</div>

<!-- APPLY KARO -->
<div class="apply-wrap">
  <a href="https://forms.gle/2Dmb8XtCy2cF6cQK6" target="_blank" class="apply-btn">Apply Karo</a>
</div>

<!-- ONLY FOR + wavy line -->
<div class="only-for">
  <p>Only For 100 Seriously Interested Students</p>
  <div class="wavy-wrap">
    <div class="wavy-inner">
      <svg width="480" height="20" viewBox="0 0 480 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,10 C20,3 40,17 60,10 C80,3 100,17 120,10 C140,3 160,17 180,10 C200,3 220,17 240,10 C260,3 280,17 300,10 C320,3 340,17 360,10 C380,3 400,17 420,10 C440,3 460,17 480,10"
          stroke="#cc0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <svg width="480" height="20" viewBox="0 0 480 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,10 C20,3 40,17 60,10 C80,3 100,17 120,10 C140,3 160,17 180,10 C200,3 220,17 240,10 C260,3 280,17 300,10 C320,3 340,17 360,10 C380,3 400,17 420,10 C440,3 460,17 480,10"
          stroke="#cc0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

</body>
</html>
